#
# Stapeln selur-compose.toml — NAFA App
# Deno server on port 8080 (Chainguard Deno image)

[project]
name = "nafa-app"

[services.app]
build = { context = ".", dockerfile = "Containerfile" }
restart = "unless-stopped"
networks = ["default"]
ports = ["8080:8080"]

environment = { PORT = "8080" }

healthcheck = { test = "curl -f http://localhost:8080/ || exit 1", interval = "30s", timeout = "5s", start_period = "10s", retries = 3 }

[services.app.labels]
"org.opencontainers.image.title" = "NAFA App"

[networks.default]
driver = "bridge"
